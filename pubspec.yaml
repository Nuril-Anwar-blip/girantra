name: girantra
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # supabase & auth
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.0

# state management
  flutter_riverpod: ^2.6.1

# navigation
  go_router: ^14.6.3

# UI & design
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0

# map location
  geolocator: ^13.0.2
  geocoding: ^4.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  google_maps_flutter: ^2.14.0
  timezone: ^0.10.1

# payment
  qr_flutter: ^4.1.0
  share_plus: 12.0.2

# image
  image_picker: ^1.2.1

# utilitis
  intl: ^0.20.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.0.0
  permission_handler: ^12.0.1
  camera: ^0.11.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_girantra.png"
